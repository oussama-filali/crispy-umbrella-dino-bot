<body>
  <noscript>Vous devez activer JavaScript pour utiliser Dino Bot.</noscript>

  <div id="root"></div>

  <!-- 📊 PostHog (PROD ONLY SAFE) -->
  <script>
    (function () {
      var location = window.location || {};
      var hostname = location.hostname;
      var port = String(location.port || "");

      function isPrivateIp(host) {
        if (!host || !/^\\d+\\.\\d+\\.\\d+\\.\\d+$/.test(host)) return false;
        var parts = host.split(".").map(function (n) { return parseInt(n, 10); });
        var a = parts[0], b = parts[1];
        return (
          a === 10 ||
          (a === 192 && b === 168) ||
          (a === 172 && b >= 16 && b <= 31)
        );
      }

      var isDev =
        hostname === "localhost" ||
        hostname === "127.0.0.1" ||
        hostname === "0.0.0.0" ||
        isPrivateIp(hostname) ||
        port === "3000";

      if (isDev) return;

      try {
        posthog.init("%REACT_APP_POSTHOG_KEY%", {
          api_host: "https://us.i.posthog.com",
          person_profiles: "identified_only",
        });
      } catch (e) {
        console.warn("PostHog init failed:", e);
      }
    })();
  </script>
</body>
